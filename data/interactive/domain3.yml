interactive_questions:
  - id: iq-d3-001
    domain: domain3
    type: ordering
    question: "Arrange the OSI model layers from LAYER 7 (highest) to LAYER 1 (lowest):"
    items:
      - "Application"
      - "Presentation"
      - "Session"
      - "Transport"
      - "Network"
      - "Data Link"
      - "Physical"
    correct_order: [0, 1, 2, 3, 4, 5, 6]
    explanation: >
      The OSI model has 7 layers from top (Layer 7) to bottom (Layer 1): Application (user-facing protocols: HTTP, FTP, SMTP), Presentation (encoding/encryption/compression), Session (session management), Transport (TCP/UDP, end-to-end delivery), Network (IP routing), Data Link (MAC addressing, switches), Physical (bits, cables, NICs). Security controls operate at different layers — firewalls at Layer 3-4, WAFs at Layer 7.

  - id: iq-d3-002
    domain: domain3
    type: matching
    question: "Match each CLOUD SERVICE MODEL to what the CUSTOMER manages:"
    items:
      - "Applications, data; provider manages everything else"
      - "Applications and data; provider manages OS through hardware"
      - "OS, applications, and data; provider manages hardware and hypervisor"
    categories:
      - "SaaS"
      - "PaaS"
      - "IaaS"
    correct_mapping:
      "Applications, data; provider manages everything else": "SaaS"
      "Applications and data; provider manages OS through hardware": "PaaS"
      "OS, applications, and data; provider manages hardware and hypervisor": "IaaS"
    explanation: >
      The Shared Responsibility Model defines security boundaries. SaaS customers manage only data access and configurations. PaaS customers manage their deployed applications and data. IaaS customers manage OS, middleware, runtime, applications, and data — the most customer responsibility. 'As you go up the stack, you give up more control to the provider.'

  - id: iq-d3-003
    domain: domain3
    type: multiselect
    question: "Which protocols transmit data in PLAINTEXT and should be replaced with secure alternatives? (Select ALL that apply)"
    options:
      - "Telnet"
      - "SSH"
      - "FTP"
      - "SFTP"
      - "HTTP"
      - "HTTPS"
      - "SNMP v1/v2"
    correct_answers: [0, 2, 4, 6]
    explanation: >
      Telnet, FTP, HTTP, and SNMPv1/v2 all transmit data in plaintext. Their secure replacements are: SSH (replaces Telnet), SFTP/FTPS (replaces FTP), HTTPS/TLS (replaces HTTP), and SNMPv3 (replaces v1/v2). Using plaintext protocols exposes credentials and data to eavesdropping — network monitoring tools can capture this data in transit.

  - id: iq-d3-004
    domain: domain3
    type: fillblank
    template: "A {blank} sits between an internal network and the internet, hosting public-facing servers while protecting the internal network from direct internet exposure."
    choices:
      - "Air gap"
      - "DMZ (Demilitarized Zone)"
      - "VLAN trunk"
      - "Load balancer"
    correct_answer: 1
    explanation: >
      A DMZ (Demilitarized Zone), also called a screened subnet, is a network segment between the internet and the internal trusted network, typically protected by firewalls on both sides. Public-facing services (web servers, email servers, DNS) are placed in the DMZ. If an internet-facing server is compromised, the attacker still faces the internal firewall before reaching sensitive internal systems.
